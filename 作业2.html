<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        width: 600px;
        height: 320px;
        text-align: center;
        margin-left: 30%;
        margin-top: 200px;
        background-color: rgb(174, 219, 240);
    }

    .dahufa {
        height: 100px;
        width: 300px;
        background-color: rgb(64, 161, 218);
        display: inline-block;
        text-align: center;
        line-height: 100px;
        border-radius: 20px;
    }

    .p {
        height: 50px;
    }

    #id1 {
        width: 220px;
        height: 80px;
        background-color: rgb(75, 166, 226);
        float: left;
        text-align: center;
        border-radius: 20px;
        line-height: 70px;
    }

    #id2 {
        width: 220px;
        height: 80px;
        background-color: rgb(75, 166, 226);
        float: right;
        text-align: center;
        /* display: inline-block; */
        border-radius: 20px;
        line-height: 70px;
    }
</style>

<body>
    <div>
        <h2>我是一个h2标题</h2>
        <span class="dahufa">我不仅垂直居中，我还是圆角的😍</span><br \>
        <p>上面的圆角框是300*300的哦而且我跟上下都是20px</p><br>
        <span id="id1">我是200*80的左护法</span>
        <span style="float:left;width: 150px;height: 90px;"> 整个蓝色大框<br>是600*320的</span>
        <span id="id2">我是200*80的右护法</span>

    </div>
</body>

</html>
