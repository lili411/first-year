<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        width: 500px;
        height: 500px;
        background-color: rgb(248, 195, 59);
        margin-top: 150px;
        margin-left: 30%;
        border-radius: 100%;
        border: 10px solid;
        position: relative;
        display: inline-block;
    }

    span {
        font-size: 170px;
        width: 700px;
        display: inline-block;
        position: absolute;
        top: 80px;
        left: 20px;

    }



    .togue {
        width: 100px;
        height: 50px;
        background-color: red;
        display: inline-block;
        border-radius: 100px 100px 0 0;
        position: absolute;
        border: black;
        top: 410px;
        left: 200px;
    }

    .banyuan {
        width: 240px;
        height: 120px;
        border-radius: 0px 0px 120px 120px;
        display: inline-block;
        background-color: black;
        position: absolute;
        top: 350px;
        left: 130px;
    }

    .teech {
        width: 225px;
        height: 30px;
        background-color: white;
        display: inline-block;
        position: absolute;
        top: 350px;
        left: 136px;

    }
</style>

<body>
    <div>
        <span>🧡🧡</span><span class="banyuan"></span><span class="togue"></span><span class="teech"></span>
    </div>

</body>

</html>
