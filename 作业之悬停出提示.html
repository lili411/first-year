<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .big {
        position: relative;
        top: 290px;
        left: 549px;
    }

    .xiaotubiao {
        width: 15px;
        height: 15px;
        border: 1px solid red;
        border-radius: 50%;
        font-size: 2px;
        position: relative;
        display: inline-block;
        color: red;
        cursor: pointer;
        line-height: 15px;
        top: 37px;
        right: -64px;
        z-index: 999;
        text-align: center;
    }

    .div {
        background-color: white;
        width: 200px;
        height: 40px;
        text-align: center;
        line-height: 40px;
        border-radius: 1em;
        position: relative;
        left: 600px;
        top: 300px;
    }

    body {
        background-color: rgb(51, 51, 51);
    }

    .text {
        position: absolute;
        width: 150px;
        height: 35px;
        background-color: rgb(96, 153, 201);
        text-align: center;
        font-size: 1px;
        overflow: hidden;
        border-radius: 5em;
        z-index: 1000;
        line-height: 17px;
        filter: opacity(0);

    }

    .triangle {
        height: 0;
        width: 0;
        font-size: 0;
        line-height: 0;
        border-color: rgb(96, 153, 201) transparent transparent transparent;
        border-style: solid;
        border-width: 5px;
        position: relative;
        z-index: 1000;
        top: 45px;
        right: -68px;
        filter: opacity(0);
    }

    .big:hover span {
        filter: opacity(1);
        transition: all 1s;
    }
</style>

<body>
    <div class="big">
        <span class="triangle" style="display: block;"></span>
        <span class="text" style="display: block;">Sample text for your tooltip!</span>
        <div class="xiaotubiao">i</div>
    </div>
    <div class="div">
        &nbsp; Hover over zhe 'i'!
    </div>
</body>

</html
